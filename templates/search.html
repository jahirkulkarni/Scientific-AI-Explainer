<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Terminology Explainer</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Poppins", sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white; padding: 20px; }
        
        
        .main-container { display: flex; gap: 20px; width: 1000px; max-width: 95%; height: 600px; }
        
        
        .history-sidebar { width: 250px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
        .history-sidebar h3 { font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .h-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
        .del-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; margin-left: 10px; }

        
        .wrapper { flex: 1; padding:35px; border-radius:20px; background:rgba(255,255,255,0.08); backdrop-filter: blur(12px); box-shadow:0 10px 40px rgba(0,0,0,0.4); overflow-y: auto; }
        .title { text-align:center; font-size:30px; margin-bottom:25px; font-weight:600; }
        .search-box { display:flex; gap:10px; margin-bottom:25px; }
        .search-box input { flex:1; padding:14px; border:none; border-radius:10px; outline:none; font-size:15px; color: #333; }
        .search-box button { padding:14px 22px; border:none; border-radius:10px; background:linear-gradient(45deg,#00f260,#0575e6); color:white; font-weight:bold; cursor:pointer; }
        .result-card { background:rgba(255,255,255,0.12); padding:20px; border-radius:15px; display: none; }
        .term { font-size:20px; font-weight:600; margin-bottom:10px; color:#7dd3fc; }
        .explanation { line-height:1.6; font-size:14px; color:#e5e7eb; }
        .tag { display:inline-block; background:#06b6d4; padding:5px 10px; border-radius:20px; font-size:11px; margin:4px; }
        .debug { margin-top:20px; background:#020617; color:#22c55e; padding:15px; border-radius:10px; font-family:monospace; font-size:11px; display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="history-sidebar">
        <h3>Search History</h3>
        <div id="hList"></div>
    </div>

    <div class="wrapper">
        <div class="title">🔬 ConceptClarity</div>
        <div class="search-box">
            <input type="text" id="termInput" placeholder="Enter term...">
            <button onclick="handleSearch()" id="btn">Explain</button>
        </div>

        <div class="result-card" id="resCard">
            <div class="term" id="resTerm"></div>
            <div class="explanation" id="resDesc"></div>
            <div id="resTags" class="tags"></div>
        </div>

        <div class="debug" id="debugWindow">
            [DEBUG JSON]<br>
            <pre id="jsonDisplay" style="white-space: pre-wrap;"></pre>
        </div>
    </div>
</div>

<script>
    async function handleSearch() {
        const term = document.getElementById('termInput').value.trim();
        if(!term) return;
        const btn = document.getElementById('btn');
        btn.innerText = "...";

        try {
            const response = await fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ term: term })
            });
            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('resCard').style.display = 'block';
                document.getElementById('debugWindow').style.display = 'block';
                document.getElementById('resTerm').innerText = data.term;
                document.getElementById('resDesc').innerText = data.explanation;
                
                const tagBox = document.getElementById('resTags');
                tagBox.innerHTML = '';
                data.related_terms.forEach(t => { tagBox.innerHTML += `<span class="tag">#${t}</span>`; });

                document.getElementById('jsonDisplay').innerText = JSON.stringify(data, null, 2);
                updateHistoryUI(data.history);
            } else { alert(data.message); }
        } catch (err) { alert("Server Error!"); }
        finally { btn.innerText = "Explain"; }
    }

    function updateHistoryUI(history) {
        const hList = document.getElementById('hList');
        hList.innerHTML = history.map(item => `
            <div class="h-item">
                <span>${item}</span>
                <span class="del-btn" onclick="deleteItem('${item}')">✕</span>
            </div>
        `).join('');
    }

    async function deleteItem(item) {
        const response = await fetch('/delete_item', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item: item })
        });
        const data = await response.json();
        updateHistoryUI(data.history);
    }
</script>
</body>
</html>
