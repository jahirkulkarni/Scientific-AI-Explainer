<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConceptClarity AI | Milestone 3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; text-align: center; }
        .container { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            max-width: 750px; margin: auto;
        }
        input { padding: 15px; width: 80%; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 20px; }
        button { padding: 15px 40px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Loading Spinner CSS */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none; /* Default hidden */
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultBox { text-align: left; margin-top: 30px; display: none; padding: 25px; background: #fff; border-left: 6px solid #3498db; border-radius: 10px; border: 1px solid #e1e8ed; }
        #jsonBox { text-align: left; margin-top: 20px; display: none; padding: 20px; background: #2c3e50; color: #ecf0f1; border-radius: 10px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ConceptClarity AI</h1>
        <form id="searchForm">
            <input type="text" name="term" placeholder="Enter scientific term..." required>
            <br>
            <button type="submit" id="submitBtn">Explain Concept</button>
        </form>

        <div id="loadingCircle" class="loader"></div>

        <div id="resultBox">
            <h2 id="resTerm" style="color: #3498db; margin-top: 0;"></h2>
            <p id="resText"></p>
        </div>

        <div id="jsonBox">
            <p style="border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;"><strong>JSON Response:</strong></p>
            <pre id="jsonRaw"></pre>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            // 1. UI Reset & Show Loader
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('jsonBox').style.display = 'none';
            document.getElementById('loadingCircle').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch('/search', { method: 'POST', body: formData });
                const data = await response.json();

                // 2. Hide Loader & Show Result
                document.getElementById('loadingCircle').style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resTerm').innerText = data.term;
                document.getElementById('resText').innerText = data.explanation;

                document.getElementById('jsonBox').style.display = 'block';
                document.getElementById('jsonRaw').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                alert("Something went wrong!");
                document.getElementById('loadingCircle').style.display = 'none';
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        };
    </script>
</body>
</html>
