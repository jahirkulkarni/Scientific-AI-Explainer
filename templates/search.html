<!DOCTYPE html>
<html>
<head>
    <title>ConceptClarity | Module 4</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 40px; }
        .app-card { background: white; width: 480px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 35px; text-align: center; }
        input { width: 90%; padding: 15px; border: 2px solid #3498db; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .btn-explain { background: #00873c; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #resultArea { text-align: left; margin-top: 30px; display: none; }
        .explanation-text { color: #444; line-height: 1.6; border: 1px solid #eee; padding: 20px; border-radius: 10px; background: #fff; }
        .tag { background: #006d2c; color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; margin-right: 8px; display: inline-block; margin-top: 8px; font-weight: 500; }
        #jsonBox { margin-top: 20px; background: #222; color: #0f0; padding: 15px; font-size: 11px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="app-card">
        <h1>ConceptClarity</h1>
        <form id="searchForm">
            <input type="text" id="termInput" placeholder="Enter scientific term..." required>
            <button type="submit" class="btn-explain" id="btnText">Explain</button>
        </form>

        <div id="resultArea">
            <h3 id="resTitle" style="color: #3498db; text-transform: uppercase;"></h3>
            <div class="explanation-text" id="resDesc"></div>
            
            <div style="margin-top:25px; font-weight:bold; color: #2c3e50;">Related Terms:</div>
            <div id="tagList" style="margin-bottom: 20px;"></div>
            
            <div style="margin-top:20px; font-size:12px; color:green; background:#e8f5e9; padding:10px; border-radius:8px; text-align:center; font-weight: bold;">
                📦 Containerized with Docker
            </div>

            <div id="jsonBox">
                <strong>[DEBUG] JSON RESPONSE:</strong>
                <pre id="jsonRaw" style="white-space: pre-wrap; margin-top: 10px; font-family: monospace;"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').onsubmit = async (e) => {
            e.preventDefault();
            const termValue = document.getElementById('termInput').value;
            const btn = document.getElementById('btnText');
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch('/search', { 
                    method: 'POST', 
                    body: new URLSearchParams({'term': termValue}) 
                });
                
                const data = await response.json();

                if(data.status === 'success') {
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('resTitle').innerText = data.term;
                    document.getElementById('resDesc').innerText = data.explanation;
                    
                    // Show JSON Debug Box
                    document.getElementById('jsonBox').style.display = 'block';
                    document.getElementById('jsonRaw').innerText = JSON.stringify(data, null, 2);

                    const tagList = document.getElementById('tagList');
                    tagList.innerHTML = '';
                    data.related_terms.forEach(t => {
                        tagList.innerHTML += `<span class="tag">${t}</span>`;
                    });
                }
            } catch (err) {
                alert("Server Connection Failed!");
            } finally {
                btn.innerText = "Explain";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
